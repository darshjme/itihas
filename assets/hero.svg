<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 280" width="800" height="280">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117"/>
      <stop offset="100%" style="stop-color:#161b22"/>
    </linearGradient>
    <linearGradient id="accent_grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#1f6feb;stop-opacity:0"/>
      <stop offset="50%" style="stop-color:#1f6feb;stop-opacity:0.6"/>
      <stop offset="100%" style="stop-color:#1f6feb;stop-opacity:0"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="280" fill="url(#bg)"/>
  <!-- Subtle grid -->
  <g stroke="#21262d" stroke-width="0.5" opacity="0.4">
    <line x1="0" y1="56" x2="800" y2="56"/>
    <line x1="0" y1="112" x2="800" y2="112"/>
    <line x1="0" y1="168" x2="800" y2="168"/>
    <line x1="200" y1="0" x2="200" y2="280"/>
    <line x1="400" y1="0" x2="400" y2="280"/>
    <line x1="600" y1="0" x2="600" y2="280"/>
  </g>

  <!-- Accent glow bar -->
  <rect x="0" y="270" width="800" height="3" fill="url(#accent_grad)"/>
  <rect x="0" y="0" width="800" height="3" fill="url(#accent_grad)"/>

  <!-- Animation area (right side) -->
  <g>
    <rect x="555" y="70" width="230" height="30" rx="4" fill="#3fb950" fill-opacity="0.06" stroke="#3fb950" stroke-width="0.5">
      <animate attributeName="fill-opacity" values="0.06;0.2;0.06" dur="4s" begin="0.0s" repeatCount="indefinite"/>
    </rect>
    <text x="565" y="89" fill="#3fb950" font-family="monospace" font-size="10" font-weight="bold">INFO</text>
    <text x="605" y="89" fill="#8b949e" font-family="monospace" font-size="10">agent started</text>
    <rect x="555" y="108" width="230" height="30" rx="4" fill="#e3b341" fill-opacity="0.06" stroke="#e3b341" stroke-width="0.5">
      <animate attributeName="fill-opacity" values="0.06;0.2;0.06" dur="4s" begin="0.7s" repeatCount="indefinite"/>
    </rect>
    <text x="565" y="127" fill="#e3b341" font-family="monospace" font-size="10" font-weight="bold">WARN</text>
    <text x="605" y="127" fill="#8b949e" font-family="monospace" font-size="10">retry attempt 2</text>
    <rect x="555" y="146" width="230" height="30" rx="4" fill="#f85149" fill-opacity="0.06" stroke="#f85149" stroke-width="0.5">
      <animate attributeName="fill-opacity" values="0.06;0.2;0.06" dur="4s" begin="1.4s" repeatCount="indefinite"/>
    </rect>
    <text x="565" y="165" fill="#f85149" font-family="monospace" font-size="10" font-weight="bold">ERROR</text>
    <text x="605" y="165" fill="#8b949e" font-family="monospace" font-size="10">timeout exceeded</text>
    <rect x="555" y="184" width="230" height="30" rx="4" fill="#3fb950" fill-opacity="0.06" stroke="#3fb950" stroke-width="0.5">
      <animate attributeName="fill-opacity" values="0.06;0.2;0.06" dur="4s" begin="2.0999999999999996s" repeatCount="indefinite"/>
    </rect>
    <text x="565" y="203" fill="#3fb950" font-family="monospace" font-size="10" font-weight="bold">INFO</text>
    <text x="605" y="203" fill="#8b949e" font-family="monospace" font-size="10">fallback activated</text></g>

  <!-- Left: text content -->
  <!-- Package badge -->
  <rect x="40" y="38" width="110" height="22" rx="11" fill="#1f6feb" fill-opacity="0.12" stroke="#1f6feb" stroke-width="1" stroke-opacity="0.5"/>
  <text x="95" y="53" fill="#1f6feb" font-family="monospace" font-size="11" text-anchor="middle" font-weight="600">darshjme</text>

  <!-- Title -->
  <text x="40" y="110" fill="#f0f6fc" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="38" font-weight="700" letter-spacing="-1">agent-log</text>

  <!-- Tagline -->
  <text x="40" y="148" fill="#8b949e" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="15">Structured JSON logging for LLM agents — zero dependencies.</text>

  <!-- Divider -->
  <line x1="40" y1="170" x2="460" y2="170" stroke="#1f6feb" stroke-width="0.5" stroke-opacity="0.4"/>

  <!-- Pills -->
  
    <rect x="118" y="220" width="168" height="26" rx="13" fill="#1f6feb" fill-opacity="0.15" stroke="#1f6feb" stroke-width="1"/>
    <text x="202" y="237" fill="#1f6feb" font-family="monospace" font-size="11" text-anchor="middle">Structured Logging</text>
    <rect x="298" y="220" width="104" height="26" rx="13" fill="#1f6feb" fill-opacity="0.15" stroke="#1f6feb" stroke-width="1"/>
    <text x="350" y="237" fill="#1f6feb" font-family="monospace" font-size="11" text-anchor="middle">Log Levels</text>
    <rect x="414" y="220" width="144" height="26" rx="13" fill="#1f6feb" fill-opacity="0.15" stroke="#1f6feb" stroke-width="1"/>
    <text x="486" y="237" fill="#1f6feb" font-family="monospace" font-size="11" text-anchor="middle">Context Binding</text>
    <rect x="570" y="220" width="112" height="26" rx="13" fill="#1f6feb" fill-opacity="0.15" stroke="#1f6feb" stroke-width="1"/>
    <text x="626" y="237" fill="#1f6feb" font-family="monospace" font-size="11" text-anchor="middle">JSON Output</text>
</svg>